version: '3.8'
services:
  db:
    image: postgres:15
    container_name: basemanager_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: basemanager
    ports:
      - '5432:5432'
    volumes:
      - basemanager_data:/var/lib/postgresql/data

volumes:
  basemanager_data:
